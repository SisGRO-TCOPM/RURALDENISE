<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Rural - Denise</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    font-family: Arial;
    margin:0;
}

#painel{
    width:100%;
    padding:10px;
    background:#f4f4f4;
}

#map{
    height:50vh;
    width:100%;
}

button{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-bottom:8px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:8px;
}

button:active{
    background:#0d47a1;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-bottom:8px;
    border-radius:8px;
}

input:focus{
    outline:2px solid #1976d2;
}

label{
    font-weight:bold;
    font-size:14px;
}

.item{
    background:white;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

@media(min-width:768px){
    body{ display:flex; }
    #painel{
        width:35%;
        height:100vh;
        overflow-y:auto;
    }
    #map{
        width:65%;
        height:100vh;
    }
}
</style>
</head>
<body>

<div id="painel">
<h3>Cadastro</h3>

<input type="hidden" id="indiceEdicao">

<label>Nome da Propriedade</label>
<input type="text" id="nome">

<label>Nome do Proprietário</label>
<input type="text" id="proprietario">

<label>Telefone do Proprietário</label>
<input type="text" id="telProprietario">

<label>Nome do Gerente / Responsável</label>
<input type="text" id="gerente">

<label>Telefone do Gerente</label>
<input type="text" id="telGerente">

<label>Foto da Propriedade</label>
<input type="file" id="foto" accept="image/*" onchange="previewImagem(event)">
<img id="preview" width="100%" style="display:none;margin-bottom:10px;">

<label>Latitude</label>
<input type="text" id="lat">

<label>Longitude</label>
<input type="text" id="lng">

<button onclick="salvarOuEditar()">Salvar / Atualizar</button>

<hr>

<button onclick="exportarBackup()">Exportar Backup</button>
<input type="file" accept=".json" onchange="importarBackup(event)">

<h3>Pesquisar</h3>
<input type="text" id="pesquisa" placeholder="Digite o nome..." onkeyup="filtrarLista()">

<div id="lista"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

var map = L.map('map').setView([-14.4086, -57.6585], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var propriedades = JSON.parse(localStorage.getItem("propriedades")) || [];
var marcadores = [];
var marcadorTemp;

// Clique no mapa
map.on('click', function(e){

    limparCampos();

    lat.value = e.latlng.lat.toFixed(6);
    lng.value = e.latlng.lng.toFixed(6);

    if(marcadorTemp) map.removeLayer(marcadorTemp);

    marcadorTemp = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
});

// Compressão de imagem
function previewImagem(event){
    var file = event.target.files[0];
    if(!file) return;

    var reader = new FileReader();

    reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
            var canvas = document.createElement("canvas");
            var ctx = canvas.getContext("2d");

            var maxWidth = 800;
            var scale = maxWidth / img.width;

            canvas.width = maxWidth;
            canvas.height = img.height * scale;

            ctx.drawImage(img,0,0,canvas.width,canvas.height);

            var compressed = canvas.toDataURL("image/jpeg",0.7);

            preview.src = compressed;
            preview.style.display = "block";
        }
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function salvarOuEditar(){

    var indice = indiceEdicao.value;
    var imagem = preview.src || "";

    var dados = {
        nome: nome.value.trim(),
        proprietario: proprietario.value.trim(),
        telProprietario: telProprietario.value.trim(),
        gerente: gerente.value.trim(),
        telGerente: telGerente.value.trim(),
        lat: lat.value,
        lng: lng.value,
        foto: imagem
    };

    if(dados.nome=="" || dados.lat=="" || dados.lng==""){
        alert("Preencha Nome e Coordenadas!");
        return;
    }

    if(indice===""){
        propriedades.push(dados);
    }else{
        propriedades[indice]=dados;
    }

    localStorage.setItem("propriedades", JSON.stringify(propriedades));

    limparCampos();
    carregarTudo();

    alert("Salvo com sucesso!");
}

function carregarTudo(){
    marcadores.forEach(m=>map.removeLayer(m));
    marcadores=[];
    atualizarLista();

    propriedades.forEach((prop,index)=>{
        var marker=L.marker([prop.lat,prop.lng]).addTo(map);

        marker.bindPopup(
            "<b>"+prop.nome+"</b><br>"+
            (prop.foto ? "<img src='"+prop.foto+"' width='200'><br>" : "")+
            "Proprietário: "+prop.proprietario+"<br>"+
            "Tel: "+prop.telProprietario+"<br><br>"+
            "Gerente: "+prop.gerente+"<br>"+
            "Tel: "+prop.telGerente+"<br><br>"+
            "<button onclick='tracarRota("+prop.lat+","+prop.lng+")'>Traçar Rota</button>"
        );

        marcadores.push(marker);
    });
}

function atualizarLista(){
    lista.innerHTML="";

    propriedades.forEach((prop,index)=>{
        var div=document.createElement("div");
        div.className="item";

        div.innerHTML=`
            <b>${prop.nome}</b><br>
            <small>${prop.proprietario}</small><br><br>
            <button onclick="editarPropriedade(${index})">Editar</button>
            <button onclick="tracarRota(${prop.lat},${prop.lng})">Rota</button>
        `;

        lista.appendChild(div);
    });
}

function editarPropriedade(index){
    var prop=propriedades[index];

    nome.value=prop.nome;
    proprietario.value=prop.proprietario;
    telProprietario.value=prop.telProprietario;
    gerente.value=prop.gerente;
    telGerente.value=prop.telGerente;
    lat.value=prop.lat;
    lng.value=prop.lng;

    indiceEdicao.value=index;

    map.setView([prop.lat,prop.lng],16);

    if(prop.foto){
        preview.src=prop.foto;
        preview.style.display="block";
    }

    document.getElementById("painel").scrollTo({top:0,behavior:"smooth"});
}

function filtrarLista(){
    var termo=pesquisa.value.toLowerCase();
    var itens=document.querySelectorAll(".item");

    itens.forEach(item=>{
        item.style.display=item.innerText.toLowerCase().includes(termo)?"block":"none";
    });
}

function tracarRota(lat,lng){
    var url="https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng;
    window.open(url,"_blank");
}

function limparCampos(){
    nome.value="";
    proprietario.value="";
    telProprietario.value="";
    gerente.value="";
    telGerente.value="";
    lat.value="";
    lng.value="";
    indiceEdicao.value="";
    preview.src="";
    preview.style.display="none";
}

function exportarBackup(){
    var dados=localStorage.getItem("propriedades");
    if(!dados){ alert("Nenhum dado para exportar!"); return; }

    var blob=new Blob([dados],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="backup_propriedades_denise.json";
    a.click();
    URL.revokeObjectURL(url);
}

function importarBackup(event){
    var arquivo=event.target.files[0];
    if(!arquivo) return;

    var reader=new FileReader();
    reader.onload=function(e){
        try{
            if(confirm("Isso substituirá os dados atuais. Continuar?")){
                var dadosImportados=JSON.parse(e.target.result);
                localStorage.setItem("propriedades",JSON.stringify(dadosImportados));
                propriedades=dadosImportados;
                carregarTudo();
                alert("Backup importado!");
            }
        }catch{
            alert("Arquivo inválido!");
        }
    };
    reader.readAsText(arquivo);
}

carregarTudo();

</script>
</body>
</html>
